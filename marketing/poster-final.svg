      <polygon points="256,440 392,240 256,280" fill="rgba(167,139,250,0.14)" stroke="rgba(167,139,250,0.28)" stroke-width="1.2"/>
      <polygon points="256,440 120,240 60,260" fill="rgba(129,140,248,0.14)" stroke="rgba(129,140,248,0.28)" stroke-width="1.2"/>
      <polygon points="256,440 392,240 460,260" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.24)" stroke-width="1.2"/>
