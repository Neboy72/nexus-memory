  <text x="423" y="623" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#94a3b8">Cursor</text>

  <!-- Kilo Code: left-mid (294,499) -->
  <circle cx="294" cy="499" r="28" fill="#0f1a3a" stroke="#6366f1" stroke-width="1.8"/>
  <text x="294" y="504" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="14" fill="#6366f1">K</text>
  <text x="294" y="539" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#94a3b8">Kilo Code</text>

  <!-- Cline: left-upper (268,325) -->
  <circle cx="268" cy="325" r="28" fill="#0f1a3a" stroke="#6366f1" stroke-width="1.8"/>
  <text x="268" y="331" text-anchor="middle" font-family="monospace" font-weight="700" font-size="11" fill="#8b5cf6">CL</text>
  <text x="268" y="365" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#94a3b8">Cline</text>

