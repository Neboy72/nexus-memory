  <!-- ===== CONNECTORS ===== -->
  <!-- Agent positions: (angle, dist) -->
  <!-- 0:Hermes 270/230, 1:OpenClaw 330/230, 2:Claude 30/230, 3:Codex 80/230, 4:Cursor 135/230, 5:Kilo 190/230, 6:Cline 240/230, 7:+more 10/260 -->
  <g fill="none" stroke="#6366f1" stroke-width="2.2" stroke-opacity="0.4" stroke-linecap="round">
    <!-- Hermes: 600,190 -->
    <path d="M600,420 Q600,305 600,190"/>
    <!-- OpenClaw: 799,305 -->
    <path d="M600,420 Q700,363 799,305"/>
    <!-- Claude Code: 799,535 -->
    <path d="M600,420 Q700,478 799,535"/>
    <!-- Codex: 640,646 -->
    <path d="M600,420 Q620,533 640,646"/>
    <!-- Cursor: 423,583 -->
    <path d="M600,420 Q512,502 423,583"/>
    <!-- Kilo Code: 294,499 -->
    <path d="M600,420 Q447,460 294,499"/>
    <!-- Cline: 268,325 -->
    <path d="M600,420 Q434,373 268,325"/>
    <!-- +more: 218,190 -->
    <path d="M600,420 Q409,305 218,190"/>
  </g>

