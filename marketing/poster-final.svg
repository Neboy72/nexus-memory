    <polygon points="256,80 120,240 256,200" fill="rgba(99,102,241,0.10)" stroke="rgba(99,102,241,0.20)" stroke-width="1"/>
    <polygon points="256,80 392,240 256,200" fill="rgba(99,102,241,0.06)" stroke="rgba(99,102,241,0.14)" stroke-width="1"/>
    <polygon points="256,80 120,240 80,120" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.18)" stroke-width="1"/>
    <polygon points="256,80 392,240 432,120" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.14)" stroke-width="1"/>
    <polygon points="256,440 120,240 256,200" fill="rgba(99,102,241,0.07)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
