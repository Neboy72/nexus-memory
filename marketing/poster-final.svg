  <text x="600" y="230" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#94a3b8">Hermes</text>

  <!-- OpenClaw: right-upper (799,305) -->
  <circle cx="799" cy="305" r="28" fill="#0f1a3a" stroke="#6366f1" stroke-width="1.8"/>
  <text x="799" y="310" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="12" fill="#a78bfa">OC</text>
  <text x="799" y="345" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#94a3b8">OpenClaw</text>

  <!-- Claude Code: right-lower (799,535) -->
