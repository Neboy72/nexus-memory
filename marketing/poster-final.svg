  <text x="218" y="196" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="16" fill="#818cf8">+</text>
  <text x="218" y="230" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#94a3b8">+ more</text>

  <!-- ===== TEXT ===== -->
  <!-- Badge -->
  <rect x="460" y="712" width="280" height="26" rx="13" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-width="1" stroke-opacity="0.15"/>
  <text x="600" y="730" text-anchor="middle" fill="#818cf8" font-family="Inter,sans-serif" font-size="12" font-weight="600" letter-spacing="0.5">✦ Universal Memory Layer</text>

  <!-- Headline -->
  <text x="600" y="792" text-anchor="middle" fill="#f1f5f9" font-family="Inter,sans-serif" font-size="54" font-weight="800" letter-spacing="-1.5">One Memory</text>
  <text x="600" y="850" text-anchor="middle" fill="url(#grad)" font-family="Inter,sans-serif" font-size="54" font-weight="800" letter-spacing="-1.5">for All Your Agents</text>

  <!-- Subtitle -->
  <text x="600" y="894" text-anchor="middle" fill="#64748b" font-family="Inter,sans-serif" font-size="14.5">
    Universal memory layer for AI agents — self-hosted, secure, and <tspan fill="#818cf8" font-weight="600">MCP-based</tspan>.
  </text>
  <text x="600" y="918" text-anchor="middle" fill="#818cf8" font-family="Inter,sans-serif" font-size="14" font-weight="500">
    What one agent learns, every agent remembers.
  </text>

  <!-- Tagline -->
  <text x="600" y="960" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="13.5" font-style="italic">
    Agents come. Agents go. <tspan fill="#818cf8" font-weight="600">Nexus Memory stays.</tspan>
  </text>

  <!-- Features -->
  <text x="600" y="996" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="12" letter-spacing="0.5">
    ✦ MCP  ✦  Local-first  ✦  Open Source
  </text>

  <!-- Footer -->
  <text x="600" y="1175" text-anchor="middle" fill="#334155" font-family="Inter,sans-serif" font-size="10.5">
