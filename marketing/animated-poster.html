<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Memory — Animated</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<script>
// ─── Agents ───
const agents = [
  { name: 'Kilo',      angle: -90 },
  { name: 'Odysseus',  angle: -40 },
  { name: 'Codex',     angle: 10  },
  { name: 'Claude Code', angle: 55 },
  { name: 'Hermes',    angle: 110 },
  { name: 'OpenClaw',  angle: 160 },
  { name: 'Cursor',    angle: -150 },
  { name: '+more',     angle: 235 },
];

let cx, cy, time = 0;
let nodes = [];

// ─── Crystal drawing ───
function drawCrystal(x, y, s, pulse) {
  push();
  translate(x, y);
  // Glow
  const glowSize = s * (0.6 + 0.2 * pulse);
  drawingContext.shadowBlur = 30 + 20 * pulse;
  drawingContext.shadowColor = 'rgba(99,102,241,0.6)';

  // Back facets
  noStroke();
  fill(99, 102, 241, 20 + 8 * pulse);
  triangle(-s*1.1, -s*0.7, -s*0.5, s*0.1, 0, -s*0.4);
  triangle(s*1.1, -s*0.7, s*0.5, s*0.1, 0, -s*0.4);

  // Front facets
  fill(129, 140, 248, 60 + 30 * pulse);
  stroke(129, 140, 248, 100 + 40 * pulse);
  strokeWeight(1.2);
  triangle(-s*0.8, -s*0.5, -s*0.6, s*0.2, 0, s*0.15);
  triangle(s*0.8, -s*0.5, s*0.6, s*0.2, 0, s*0.15);
  triangle(-s*0.6, s*0.2, 0, s*0.15, 0, s*0.5);
  triangle(s*0.6, s*0.2, 0, s*0.15, 0, s*0.5);

  // Center
  fill(167, 139, 250, 40);
  stroke(167, 139, 250, 60);
  triangle(0, -s*0.5, -s*0.6, s*0.2, s*0.6, s*0.2);

  // N letter
  drawingContext.shadowBlur = 15 + 10 * pulse;
  drawingContext.shadowColor = 'rgba(129,140,248,0.8)';
  fill(224, 231, 255, 240);
  noStroke();
  textAlign(CENTER, CENTER);
  textSize(s * 0.55);
  textStyle(BOLD);
  text('N', 0, 0);

  drawingContext.shadowBlur = 0;
  pop();
}

// ─── Agent node ───
function drawAgent(x, y, label, pulse, size) {
  const r = size * 18;
  // Line hint (subtle glow)
  stroke(99, 102, 241, 20 + 8 * pulse);
  strokeWeight(0.5);
  noFill();

  // Circle
  fill(15, 23, 42, 150 + 30 * pulse);
  stroke(99, 102, 241, 50 + 20 * pulse);
  strokeWeight(1.5);
  ellipse(x, y, r*2);

  // Label
  noStroke();
  fill(148, 163, 184, 200 + 30 * pulse);
  textAlign(LEFT, CENTER);
  textSize(13);
  text(label, x + r + 10, y);
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  cx = width / 2;
  cy = height * 0.34;
}

function draw() {
  background(6, 8, 15);

  // Grid
  stroke(30, 40, 70, 15);
  strokeWeight(0.5);
  for (let gx = 0; gx < width; gx += 40) line(gx, 0, gx, height);
  for (let gy = 0; gy < height; gy += 40) line(0, gy, width, gy);

  time += 0.008;
  const pulse = sin(time * 1.3) * 0.5 + 0.5;

  // Draw connectors
  stroke(99, 102, 241, 30 + 10 * sin(time * 2));
  strokeWeight(1);
  noFill();
  for (let i = 0; i < agents.length; i++) {
    const a = radians(agents[i].angle + 15 * sin(time * 0.7 + i * 0.8));
    const dist = 200 + 20 * sin(time + i);
    const nx = cx + cos(a) * dist;
    const ny = cy + sin(a) * dist;

    // Curvy connectors
    beginShape();
    const steps = 12;
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      const mx = lerp(cx, nx, t) + 15 * sin(t * PI + time * 2 + i) * (1 - t);
      const my = lerp(cy, ny, t) + 12 * cos(t * PI + time * 1.5 + i) * (1 - t);
      curveVertex(mx, my);
    }
    endShape();
  }

  // Draw agents
  for (let i = 0; i < agents.length; i++) {
    const a = radians(agents[i].angle + 15 * sin(time * 0.7 + i * 0.8));
    const dist = 200 + 20 * sin(time + i);
    const nx = cx + cos(a) * dist;
    const ny = cy + sin(a) * dist;
    const ap = sin(time * 1.5 + i) * 0.3 + 0.7;
    drawAgent(nx, ny, agents[i].name, ap, 1);
  }

  // Crystal
  drawCrystal(cx, cy, 55, pulse);

  // ─── Text ───
  textAlign(CENTER, CENTER);
  const ty = height * 0.68;
  // Badge
  fill(129, 140, 248, 25);
  stroke(129, 140, 248, 30);
  strokeWeight(1);
  rect(cx - 120, ty - 12, 240, 24, 12);
  noStroke();
  fill(129, 140, 248);
  textSize(12);
  text('✦ Universal Memory Layer', cx, ty);

  // Headline
  const h1y = ty + 50;
  fill(255);
  textSize(44);
  textStyle(BOLD);
  text('One Memory', cx, h1y - 20);

  drawGradientText('for All Your Agents', cx, h1y + 20, 44);

  // Subtitle
  fill(148, 163, 184);
  textSize(15);
  textStyle(NORMAL);
  const s1y = h1y + 62;
  text('Universal memory layer for AI agents — self-hosted, secure, and MCP-based.', cx, s1y);
  fill(129, 140, 248);
  text('What one agent learns, every agent remembers.', cx, s1y + 22);

  // Tagline
  fill(120, 130, 160);
  textSize(14);
  textStyle(ITALIC);
  const tly = s1y + 58;
  text('Agents come. Agents go.', cx, tly - 9);
  fill(129, 140, 248);
  text('Nexus Memory stays.', cx, tly + 9);

  // MCP row
  fill(71, 85, 105);
  textSize(12);
  textStyle(NORMAL);
  text('✦ MCP  ✦  Local-first  ✦  Open Source', cx, tly + 44);

  // URL
  fill(51, 65, 85);
  textSize(11);
  text('github.com/Neboy72/nexus-memory', cx, tly + 72);
}

function drawGradientText(txt, x, y, size) {
  const gradient = drawingContext.createLinearGradient(x - textWidth(txt)/2, y - 20, x + textWidth(txt)/2, y + 20);
  gradient.addColorStop(0, '#6366f1');
  gradient.addColorStop(0.5, '#8b5cf6');
  gradient.addColorStop(1, '#a78bfa');
  drawingContext.fillStyle = gradient;
  textSize(size);
  textStyle(BOLD);
  text(txt, x, y);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cx = width / 2;
  cy = height * 0.34;
}
</script>
</body>
</html>
