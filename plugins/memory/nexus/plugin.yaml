name: nexus
version: 0.4.0
description: "Nexus Memory — universal memory layer for AI agents. Qdrant + auto-detect embeddings (Voyage/OpenAI/Google/Jina/Ollama/sentence-transformers). Self-hosted, MCP-compatible."
pip_dependencies:
  - "qdrant-client>=1.12.0"
  - "sentence-transformers>=3.0.0"
requires_env: []
hooks:
  - on_session_end
  - on_memory_write