<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nexus Memory - Local Web UI">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>Nexus Memory</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ═══ Minimal Header ═══ -->
  <header class="header" role="banner">
    <nav class="header__nav container" role="navigation" aria-label="Main navigation">
      <a href="/" class="header__logo" aria-label="Nexus Memory Home">
        <img src="/static/assets/logo-transparent.png" alt="Nexus Memory" class="header__logo-img" width="28" height="28">
        <span class="header__logo-text">Nexus Memory</span>
      </a>

      <div class="header__links">
        <a href="https://github.com/Neboy72/nexus-memory" target="_blank" rel="noopener" class="header__link header__link--external">GitHub</a>
      </div>
    </nav>
  </header>

  <!-- ═══ Graph (Vollbild) ═══ -->
  <main class="graph-main">
    <div class="graph-controls">
      <div class="graph-controls__row">
        <div class="graph-controls__group">
          <label class="graph-controls__label" for="filterCategory">Category</label>
          <select id="filterCategory" class="graph-controls__select">
            <option value="all">All</option>
            <option value="fact">Fact</option>
            <option value="belief">Belief</option>
            <option value="session">Session</option>
            <option value="rule">Rule</option>
            <option value="preference">Preference</option>
            <option value="temp">Temp</option>
          </select>
        </div>
        <div class="graph-controls__group">
          <label class="graph-controls__label" for="filterAccess">Access</label>
          <select id="filterAccess" class="graph-controls__select">
            <option value="all">All</option>
            <option value="public">Public</option>
            <option value="trusted">Trusted</option>
            <option value="private">Private</option>
          </select>
        </div>
        <div class="graph-controls__group">
          <label class="graph-controls__label" for="filterDrift">Drift</label>
          <select id="filterDrift" class="graph-controls__select">
            <option value="all">All</option>
            <option value="fresh">Fresh</option>
            <option value="drifting">Drifting</option>
            <option value="drifted">Drifted</option>
          </select>
        </div>
        <div class="graph-controls__group graph-controls__group--search">
          <label class="graph-controls__label" for="searchInput">Search</label>
          <input type="text" id="searchInput" class="graph-controls__input" placeholder="Search memories…" autocomplete="off">
        </div>
        <div class="graph-controls__group graph-controls__group--actions">
          <button class="btn btn--secondary btn--sm" id="resetGraphBtn" title="Reset View">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            Reset
          </button>
        </div>
      </div>
      <div class="graph-controls__legend" id="graphLegend">
        <span class="legend-item"><span class="legend-dot legend-dot--fact"></span>Fact</span>
        <span class="legend-item"><span class="legend-dot legend-dot--belief"></span>Belief</span>
        <span class="legend-item"><span class="legend-dot legend-dot--session"></span>Session</span>
        <span class="legend-item"><span class="legend-dot legend-dot--rule"></span>Rule</span>
        <span class="legend-item"><span class="legend-dot legend-dot--preference"></span>Preference</span>
        <span class="legend-item"><span class="legend-dot legend-dot--temp"></span>Temp</span>
      </div>
    </div>

    <div class="graph-container" id="graphContainer">
      <div class="graph-container__loading" id="graphLoading">
        <div class="spinner"></div>
        <p>Loading memory graph…</p>
      </div>
      <svg id="graphSvg" class="graph-svg"></svg>
      <div class="graph-tooltip" id="graphTooltip"></div>
    </div>

    <!-- ═══ Stats Kacheln ═══ -->
    <div class="graph-stats" id="graphStats">
      <div class="graph-stats__grid">
        <div class="graph-stat">
          <div class="graph-stat__value" id="statTotalMemories">-</div>
          <div class="graph-stat__label">Memories</div>
        </div>
        <div class="graph-stat">
          <div class="graph-stat__value" id="statConnections">-</div>
          <div class="graph-stat__label">Connections</div>
        </div>
        <div class="graph-stat">
          <div class="graph-stat__value" id="statAvgConfidence">-</div>
          <div class="graph-stat__label">Avg Confidence</div>
        </div>
        <div class="graph-stat">
          <div class="graph-stat__value" id="statSources">-</div>
          <div class="graph-stat__label">Sources</div>
        </div>
      </div>
      <!-- ═══ Drift-Ampel ═══ -->
      <div class="graph-drift" id="graphDrift">
        <span class="graph-drift__item graph-drift__item--fresh">
          <span class="graph-drift__dot"></span>
          <span class="graph-drift__count" id="driftFresh">-</span>
          <span class="graph-drift__label">Fresh</span>
        </span>
        <span class="graph-drift__sep"></span>
        <span class="graph-drift__item graph-drift__item--drifting">
          <span class="graph-drift__dot"></span>
          <span class="graph-drift__count" id="driftDrifting">-</span>
          <span class="graph-drift__label">Drifting</span>
        </span>
        <span class="graph-drift__sep"></span>
        <span class="graph-drift__item graph-drift__item--drifted">
          <span class="graph-drift__dot"></span>
          <span class="graph-drift__count" id="driftDrifted">-</span>
          <span class="graph-drift__label">Drifted</span>
        </span>
      </div>
    </div>
  </main>

  <!-- ═══ Footer (dezent) ═══ -->
  <footer class="graph-footer">
    <span>If you like it, share it&nbsp;🍀</span>
    <a href="https://ko-fi.com/nexusmemory" target="_blank" rel="noopener" class="graph-footer__link">Ko-fi</a>
  </footer>

  <!-- ═══ Detail Panel ═══ -->
  <aside class="detail-panel" id="detailPanel" role="dialog" aria-label="Memory Detail" aria-hidden="true">
    <div class="detail-panel__backdrop" id="detailBackdrop"></div>
    <div class="detail-panel__content">
      <button class="detail-panel__close" id="detailClose" aria-label="Close">&times;</button>
      <div id="detailBody">
        <div class="detail-panel__empty">Click a node to view details</div>
      </div>
    </div>
  </aside>

  <!-- ═══ Scripts ═══ -->
  <script src="/static/d3.v7.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/graph.js?v=2"></script>
  <script src="/static/js/app.js?v=2"></script>
</body>
</html>
