<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" class="crystal-svg">
  <defs>
    <!-- N gradient (cycling through colors) -->
    <linearGradient id="nGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" class="n-stop-a" stop-color="#ffffff"/>
      <stop offset="100%" class="n-stop-b" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="crystalGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 3D Crystal: Back faces (rendered first, hidden when front is visible) -->
  <g class="crystal-back">
    <!-- Upper back facets -->
    <polygon points="256,80 120,240 256,200" class="facet back-1"/>
    <polygon points="256,80 392,240 256,200" class="facet back-2"/>
    <polygon points="256,80 120,240 80,120" class="facet back-3"/>
    <polygon points="256,80 392,240 432,120" class="facet back-4"/>
    <!-- Lower back facets -->
    <polygon points="256,440 120,240 256,200" class="facet back-5"/>
    <polygon points="256,440 392,240 256,200" class="facet back-6"/>
    <polygon points="256,440 120,240 80,120" class="facet back-7"/>
    <polygon points="256,440 392,240 432,120" class="facet back-8"/>
    <!-- Side back facets -->
    <polygon points="120,240 80,120 60,260" class="facet back-9"/>
    <polygon points="392,240 432,120 460,260" class="facet back-10"/>
  </g>

  <!-- 3D Crystal: Front faces -->
  <g class="crystal-front" filter="url(#crystalGlow)">
    <!-- Upper front facets -->
    <polygon points="256,80 120,240 256,280" class="facet front-1"/>
    <polygon points="256,80 392,240 256,280" class="facet front-2"/>
    <polygon points="256,80 120,240 60,260" class="facet front-3"/>
    <polygon points="256,80 392,240 460,260" class="facet front-4"/>
    <!-- Lower front facets -->
    <polygon points="256,440 120,240 256,280" class="facet front-5"/>
    <polygon points="256,440 392,240 256,280" class="facet front-6"/>
    <polygon points="256,440 120,240 60,260" class="facet front-7"/>
    <polygon points="256,440 392,240 460,260" class="facet front-8"/>
    <!-- Side front facets -->
    <polygon points="120,240 60,260 200,280" class="facet front-9"/>
    <polygon points="392,240 460,260 312,280" class="facet front-10"/>
    <!-- Internal wireframe lines -->
    <polygon points="256,80 256,440" class="facet wireframe" fill="none"/>
    <polygon points="120,240 392,240" class="facet wireframe" fill="none"/>
  </g>

  <!-- N letter (fixed, does not rotate) -->
  <g class="n-fixed">
    <text x="256" y="280" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="160" text-anchor="middle" dominant-baseline="central" class="n-letter">N</text>
  </g>
</svg>
