<div class="logo-live-container" id="logoLive">
  <img src="/static/assets/logo-transparent.png" alt="Nexus Memory" class="logo-live-img" width="1024" height="1024">
  <div class="logo-live-glow"></div>
</div>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

.logo-live-container {
  position: relative;
  width: 100%;
  height: 100vh;
  max-width: 220px;
  max-height: 220px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.logo-live-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  position: relative;
  z-index: 2;
  display: block;
  animation: logoAnimate 12s ease-in-out infinite;
}

.logo-live-glow {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  z-index: 1;
  background: radial-gradient(circle, 
    rgba(59,130,246,0.1) 0%, 
    rgba(139,92,246,0.05) 40%, 
    transparent 70%);
  animation: glowPulse 10s ease-in-out infinite;
  pointer-events: none;
}

@keyframes logoAnimate {
  0% {
    transform: translateY(-6px) scale(1);
    filter: hue-rotate(0deg) drop-shadow(0 0 8px rgba(59,130,246,0.1));
  }
  20% {
    transform: translateY(-2px) scale(1.01);
    filter: hue-rotate(-10deg) drop-shadow(0 0 14px rgba(139,92,246,0.2));
  }
  40% {
    transform: translateY(4px) scale(1.02);
    filter: hue-rotate(-20deg) drop-shadow(0 0 22px rgba(168,85,247,0.3));
  }
  60% {
    transform: translateY(10px) scale(1.03);
    filter: hue-rotate(10deg) drop-shadow(0 0 28px rgba(6,182,212,0.35));
  }
  80% {
    transform: translateY(4px) scale(1.02);
    filter: hue-rotate(20deg) drop-shadow(0 0 18px rgba(59,130,246,0.25));
  }
  100% {
    transform: translateY(-6px) scale(1);
    filter: hue-rotate(0deg) drop-shadow(0 0 8px rgba(59,130,246,0.1));
  }
}

@keyframes glowPulse {
  0%, 100% { transform: scale(0.95); opacity: 0.3; }
  25%      { transform: scale(1.05); opacity: 0.5; }
  50%      { transform: scale(1.15); opacity: 0.7; }
  75%      { transform: scale(1.05); opacity: 0.5; }
}
</style>
</div>
